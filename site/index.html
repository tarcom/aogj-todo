<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AOGJ's to-do</title>
<link rel="stylesheet" href="style.css?v=17">
</head>
<body>
<header>
  <div class="top">
    <h1>🏡 AOGJ's to-do</h1>
    <button id="newBtn" class="primary small">➕ Ny opgave</button>
  </div>
  <div id="balance" class="balance2"></div>
</header>

<main>
  <section class="block">
    <h3 class="vh">👤 Hvem har hvad</h3>
    <div class="cols">
      <div class="col"><h4 class="colhead" data-u="Allan">Allan <span class="tot" id="sum-Allan"></span></h4><div id="asg-Allan" class="asglist"></div></div>
      <div class="col"><h4 class="colhead" data-u="Jette">Jette <span class="tot" id="sum-Jette"></span></h4><div id="asg-Jette" class="asglist"></div></div>
    </div>
  </section>

  <section class="block">
    <h3 class="vh">📝 Skal prioriteres</h3>
    <div id="needList" class="list"></div>
    <p id="needEmpty" class="empty" hidden>Alt er prioriteret 🎉</p>
  </section>

  <section class="block">
    <h3 class="vh">📋 Opgaver <span class="sub">(sorteret efter prioritet)</span></h3>
    <div id="poolList" class="list"></div>
    <p id="poolEmpty" class="empty" hidden>Ingen opgaver klar — tildel eller tilføj en ny.</p>
  </section>

  <section class="block">
    <h3 class="vh toggle" id="doneToggle">✅ Udført <span id="doneCount" class="sub"></span></h3>
    <div id="doneList" class="list" hidden></div>
  </section>
</main>

<!-- Ny opgave -->
<div id="newModal" class="modal" hidden><div class="mbox">
  <button class="mclose" data-newclose title="Luk">×</button>
  <h3 class="mttl">Ny opgave</h3>
  <input id="t-title" class="title-in" type="text" placeholder="Hvad skal laves?" maxlength="120">
  <div class="field"><label>Kategori</label><div id="t-cat" class="chips cat"></div></div>
  <div class="field"><label>Størrelse</label><div id="t-size" class="chips size"></div></div>
  <div class="field"><label>Prioritet <span class="sub">(valgfri — kan også sættes i listen)</span></label>
    <div class="pgrid">
      <span class="pl a">Allan</span><div id="t-pa" class="chips prio"></div>
      <span class="pl j">Jette</span><div id="t-pj" class="chips prio"></div>
    </div>
  </div>
  <textarea id="t-note" class="note-in" rows="1" placeholder="Note (valgfri)"></textarea>
  <label class="upl wide" title="Tag et billede eller vælg fra galleri">📷 Billede<input id="t-photo" type="file" accept="image/*,video/*" capture="environment" hidden></label>
  <span id="addPhotoName" class="sub"></span>
  <button id="addBtn" class="primary">+ Tilføj</button>
</div></div>

<div id="toast" class="toast" hidden></div>
<div id="lightbox" class="lightbox" hidden></div>
<div id="detail" class="modal" hidden><div class="mbox" id="mbox"></div></div>
<script src="app.js?v=17"></script>
</body>
</html>
